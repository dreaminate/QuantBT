[pytest]
testpaths = app/backend/tests
markers =
    testnet: 真发 Binance testnet 订单 (默认 skip; 运行 pytest -m testnet 触发)
    slow: 慢测试 (> 5s)
    integration: 多 service 集成测试
addopts = -p no:cacheprovider --strict-markers
# 全局默认 per-test 超时兜底：任何测试（如并发/锁/网络挂死）绝不无限期 wedge 整套。
# 最慢合法测试 ~11s → 120s 留 >10× 余量；挂死 fail-fast 而非空跑数小时（防 2026-06-25 并发死锁 7-9h 事件复发）。
timeout = 120
