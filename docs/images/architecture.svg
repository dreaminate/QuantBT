<svg width="100%" viewBox="0 0 680 580" role="img" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', 'Noto Sans CJK SC', system-ui, sans-serif">
<title>QuantBT 全流程架构</title>
<desc>从数据接入到执行的七段量化流水线，Agent 与前端用同一套 REST/tool API 驱动；回测阶段强制过拟合体检；A股到 Paper、加密到 Binance 实盘两条执行边界。</desc>
<style>
  .t  { font-size: 14px; fill: #1a1a18; }
  .th { font-size: 14px; font-weight: 600; fill: #1a1a18; }
  .ts { font-size: 12px; fill: #6b6a64; }
  .box { fill: #f5f3ee; stroke: #dad7ce; stroke-width: 1; }
  .arr { stroke: #8b8a82; stroke-width: 1.5; fill: none; stroke-linecap: round; }
  .c-amber rect, rect.c-amber { fill: #faeeda; stroke: #ba7517; stroke-width: 1.5; }
  .c-amber .th, .c-amber .t { fill: #854f0b; }
  .c-amber .ts { fill: #ba7517; }
  .c-blue rect, rect.c-blue { fill: #e6f1fb; stroke: #378add; stroke-width: 1.5; }
  .c-blue .th, .c-blue .t { fill: #0c447c; }
  .c-blue .ts { fill: #185fa5; }
  @media (prefers-color-scheme: dark) {
    .t  { fill: #eceae3; }
    .th { fill: #eceae3; }
    .ts { fill: #b4b2a9; }
    .box { fill: #2c2c2a; stroke: #5f5e5a; }
    .arr { stroke: #888780; }
    .c-amber rect, rect.c-amber { fill: #633806; stroke: #fac775; }
    .c-amber .th, .c-amber .t { fill: #faeeda; }
    .c-amber .ts { fill: #fac775; }
    .c-blue rect, rect.c-blue { fill: #0c447c; stroke: #b5d4f4; }
    .c-blue .th, .c-blue .t { fill: #e6f1fb; }
    .c-blue .ts { fill: #b5d4f4; }
  }
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<!-- left rail: Agent + UI -->
<g class="c-blue">
  <rect x="40" y="64" width="128" height="390" rx="12"/>
  <text class="th" x="104" y="236" text-anchor="middle">Agent + 前端</text>
  <text class="ts" x="104" y="258" text-anchor="middle">同一套</text>
  <text class="ts" x="104" y="274" text-anchor="middle">REST + tool API</text>
  <text class="ts" x="104" y="296" text-anchor="middle">驱动全流程</text>
</g>
<line x1="168" y1="143" x2="200" y2="143" class="arr" marker-end="url(#arrow)"/>
<line x1="168" y1="259" x2="200" y2="259" class="arr" marker-end="url(#arrow)"/>
<line x1="168" y1="375" x2="200" y2="375" class="arr" marker-end="url(#arrow)"/>

<!-- pipeline stages -->
<g>
  <rect class="box" x="200" y="64" width="300" height="42" rx="10"/>
  <text class="th" x="350" y="82" text-anchor="middle">① 数据接入</text>
  <text class="ts" x="350" y="98" text-anchor="middle">Tushare · Binance Vision → Parquet/DuckDB</text>
</g>
<line x1="350" y1="106" x2="350" y2="122" class="arr" marker-end="url(#arrow)"/>

<g>
  <rect class="box" x="200" y="122" width="300" height="42" rx="10"/>
  <text class="th" x="350" y="140" text-anchor="middle">② 特征 / 因子工厂</text>
  <text class="ts" x="350" y="156" text-anchor="middle">44 算子 · 30 alpha · 五态生命周期</text>
</g>
<line x1="350" y1="164" x2="350" y2="180" class="arr" marker-end="url(#arrow)"/>

<g>
  <rect class="box" x="200" y="180" width="300" height="42" rx="10"/>
  <text class="th" x="350" y="198" text-anchor="middle">③ 模型训练</text>
  <text class="ts" x="350" y="214" text-anchor="middle">Purged k-fold + Embargo · ML / DL</text>
</g>
<line x1="350" y1="222" x2="350" y2="238" class="arr" marker-end="url(#arrow)"/>

<g>
  <rect class="box" x="200" y="238" width="300" height="42" rx="10"/>
  <text class="th" x="350" y="256" text-anchor="middle">④ 信号融合</text>
  <text class="ts" x="350" y="272" text-anchor="middle">方向 · 幅度 · 置信度 · regime</text>
</g>
<line x1="350" y1="280" x2="350" y2="296" class="arr" marker-end="url(#arrow)"/>

<g>
  <rect class="box" x="200" y="296" width="300" height="42" rx="10"/>
  <text class="th" x="350" y="314" text-anchor="middle">⑤ 组合优化</text>
  <text class="ts" x="350" y="330" text-anchor="middle">HRP · 风险预算 · 相关性/杠杆约束</text>
</g>
<line x1="350" y1="338" x2="350" y2="354" class="arr" marker-end="url(#arrow)"/>

<g class="c-amber">
  <rect x="200" y="354" width="300" height="42" rx="10"/>
  <text class="th" x="350" y="372" text-anchor="middle">⑥ 回测 + 过拟合体检</text>
  <text class="ts" x="350" y="388" text-anchor="middle">PBO · DSR · Bootstrap CI · Brinson</text>
</g>
<line x1="350" y1="396" x2="350" y2="412" class="arr" marker-end="url(#arrow)"/>

<g>
  <rect class="box" x="200" y="412" width="300" height="42" rx="10"/>
  <text class="th" x="350" y="430" text-anchor="middle">⑦ 执行</text>
  <text class="ts" x="350" y="446" text-anchor="middle">Backtest · Paper · Binance live</text>
</g>

<!-- branch to two market boundaries -->
<line x1="300" y1="454" x2="272" y2="486" class="arr" marker-end="url(#arrow)"/>
<line x1="400" y1="454" x2="428" y2="486" class="arr" marker-end="url(#arrow)"/>

<g class="c-blue">
  <rect x="200" y="486" width="145" height="44" rx="10"/>
  <text class="th" x="272" y="506" text-anchor="middle">A股</text>
  <text class="ts" x="272" y="522" text-anchor="middle">到 Paper · 不接券商</text>
</g>
<g class="c-blue">
  <rect x="355" y="486" width="145" height="44" rx="10"/>
  <text class="th" x="428" y="506" text-anchor="middle">加密</text>
  <text class="ts" x="428" y="522" text-anchor="middle">→ Binance 实盘</text>
</g>

<!-- legend -->
<rect class="c-amber" x="200" y="548" width="12" height="12" rx="3"/>
<text class="ts" x="218" y="558">过拟合体检 = 强制信任门</text>
<rect class="c-blue" x="372" y="548" width="12" height="12" rx="3"/>
<text class="ts" x="390" y="558">蓝 = 入口/边界 · Agent 驱动</text>
</svg>
